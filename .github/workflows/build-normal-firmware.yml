name: 构建 Pico2 W 普通版 DS5 固件

on:
  push:
    branches: [ build-firmware ]
  workflow_dispatch:

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 清理环境
        run: rm -rf build

      - name: 安装完整编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential g++ cmake git python3 \
            gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      # 🔥 核心：使用项目要求的 Pico SDK 2.2.0 版本 + 更新 tinyusb
      - name: 初始化 Pico SDK 2.2.0
        run: |
          # 克隆项目要求的 SDK 2.2.0 版本
          git clone --depth 1 --branch 2.2.0 https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
          cd ~/pico-sdk
          git submodule update --init --recursive
          
          # 按项目要求更新 tinyusb 到最新版
          cd lib/tinyusb
          git fetch origin
          git reset --hard origin/master

      # 🔥 精准适配：完全按照项目 CMakeLists.txt 配置，不添加多余参数
      - name: 配置 CMake
        run: |
          mkdir build && cd build
          cmake .. -DPICO_SDK_PATH=~/pico-sdk

      - name: 编译固件
        run: |
          cd build
          make -j$(nproc)
          
          # 🔥 查看所有生成的文件（确认UF2存在）
          echo "=== 构建产物 ==="
          ls -lh
          echo "=== 所有子目录 ==="
          find . -type f -name "*.uf2" -o -name "*.elf"

      # 🔥 上传所有找到的 UF2 文件
      - name: 上传刷机固件
        uses: actions/upload-artifact@v4
        with:
          name: Pico2W-Normal-DS5-Firmware
          path: build/**/*.uf2
          retention-days: 90
