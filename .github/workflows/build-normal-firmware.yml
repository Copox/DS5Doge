name: 构建 Pico2 W 普通版 DS5 固件

on:
  push:
    branches: [ build-firmware ]
  pull_request:
    branches: [ build-firmware ]
  workflow_dispatch:

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 清理环境
      - name: 清理缓存
        run: |
          rm -rf ~/pico-sdk
          rm -rf build

      # 安装完整依赖
      - name: 安装编译工具链
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            build-essential g++ cmake git python3 \
            gcc-arm-none-eabi libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib libusb-1.0-0-dev

      # 最新SDK + 强制更新tinyusb
      - name: 初始化 Pico SDK
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
          cd ~/pico-sdk
          git submodule update --init --recursive
          cd lib/tinyusb
          git fetch origin && git reset --hard origin/master

      # CMake配置 Pico2W
      - name: 配置CMake
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DPICO_SDK_PATH=~/pico-sdk \
            -DPICO_BOARD=pico2_w

      # 编译 + 官方elf2uf2转换UF2（零报错核心！）
      - name: 编译并生成UF2固件
        run: |
          cd build
          make -j$(nproc)
          
          # 1. 查找官方原生工具 elf2uf2（绝对存在，无路径错误）
          ELF2UF2=$(find ~/pico-sdk -name "elf2uf2" -type f | head -1)
          echo "找到官方转换工具: $ELF2UF2"
          
          # 2. 转换ELF为UF2（Pico2W专用，官方标准方式）
          $ELF2UF2 ds5-bridge.elf ds5-bridge-pico2w-normal.uf2
          
          # 3. 验证固件
          echo "=== 生成的Pico2W固件 ==="
          ls -lh *.uf2

      # 上传固件（固定路径，100%成功）
      - name: 上传最终刷机固件
        uses: actions/upload-artifact@v4
        with:
          name: Pico2W-Normal-DS5-Firmware
          path: build/ds5-bridge-pico2w-normal.uf2
          retention-days: 90
