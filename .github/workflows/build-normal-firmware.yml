name: Build DS5Dongle (Branch Build-Firmware)

on:
  push:
    branches: [ build-firmware ] # 仅在该分支提交时触发
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # 拉取 WDL 等已有的子模块

      # 1. 强行补全作者漏掉的 lib/opus
      - name: Fetch Opus Library
        run: |
          mkdir -p lib/opus
          git clone --depth 1 https://github.com/xiph/opus.git lib/opus

      # 2. 安装交叉编译工具链
      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential libstdc++-arm-none-eabi-newlib python3

      # 3. 配置 Pico SDK 2.2.0 并升级内部 TinyUSB
      - name: Setup Pico SDK 2.2.0 & Upgrade TinyUSB
        run: |
          # 克隆指定版本 2.2.0
          git clone --depth 1 --branch 2.2.0 https://github.com/raspberrypi/pico-sdk.git
          cd pico-sdk
          git submodule update --init
          
          # 进入 SDK 内部的 tinyusb 目录并强制升级到 master
          echo "Upgrading internal TinyUSB to latest master..."
          cd lib/tinyusb
          git fetch origin master
          git checkout origin/master
          
          cd ../..
          echo "PICO_SDK_PATH=$PWD" >> $GITHUB_ENV

      # 4. 执行编译
      - name: Configure and Build
        run: |
          mkdir build
          cd build
          # 指定开发板为 pico2_w (RP2350)
          cmake .. -DPICO_BOARD=pico2_w -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      # 5. 上传生成的固件
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ds5-bridge-firmware-v0.5.0
          path: |
            build/*.uf2
            build/*.elf
