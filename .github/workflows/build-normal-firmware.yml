name: 构建 Pico2 W 普通版 DS5 固件

on:
  push:
    branches: [ build-firmware ]
  pull_request:
    branches: [ build-firmware ]
  workflow_dispatch:

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 彻底清理环境
      - name: 清理缓存与构建目录
        run: |
          rm -rf ~/pico-sdk
          rm -rf build

      # 安装所有依赖（C++/工具链/USB）
      - name: 安装完整编译环境
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            build-essential g++ cmake git python3 \
            gcc-arm-none-eabi libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib libusb-1.0-0-dev

      # 拉取最新SDK + 强制更新tinyusb到官方最新版
      - name: 初始化 Pico SDK + 最新 tinyusb
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
          cd ~/pico-sdk
          git submodule update --init --recursive
          cd lib/tinyusb
          git fetch origin && git reset --hard origin/master

      # CMake配置：Pico2W + 开启picotool（必须用于转换UF2）
      - name: 配置CMake
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DPICO_SDK_PATH=~/pico-sdk \
            -DPICO_BOARD=pico2_w

      # 编译 + 自动将ELF转换为UF2（核心修复）
      - name: 编译并生成UF2固件
        run: |
          cd build
          make -j$(nproc)
          
          # 查找编译好的ELF文件
          ELF_FILE=$(find . -name "ds5-bridge.elf" | head -1)
          echo "找到ELF文件: $ELF_FILE"
          
          # 使用picotool转换为Pico2 W专用UF2
          ~/pico-sdk/bin/picotool convert -o ds5-bridge-pico2w-normal.uf2 $ELF_FILE
          
          # 查看生成的UF2
          ls -lh *.uf2

      # 上传UF2固件（绝对路径，100%找到）
      - name: 上传最终可刷机固件
        uses: actions/upload-artifact@v4
        with:
          name: Pico2W-Normal-DS5-Firmware
          path: build/ds5-bridge-pico2w-normal.uf2
          retention-days: 90
