name: Build Custom Pico 2W Firmware (Auto Trigger)

on:
  push:
    branches: [ "build-firmware" ]

env:
  # ================= 独立自定义配置区域 =================
  # 填写具体数值即为“自定义覆盖”，填写 "default" 即为“使用作者源码原配置”
  
  CUSTOM_FREQ: "default"              # 频率: [如 320000, 360000] 或 [default]
  CUSTOM_VOLT: "default"                # 电压: [如 1_20, 1_25, 1_30] 或 [default]
  CUSTOM_DELAY: "default"               # 延迟: [如 1000, 1500] 或 [default]
  CUSTOM_SDK: "default"              # SDK版本: [如 2.2.0, 2.1.0] 或 [default (自动读取源码要求)]
  # =================================================

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib python3

      - name: Determine SDK Version
        id: target_sdk
        run: |
          if [ "${{ env.CUSTOM_SDK }}" == "default" ]; then
            # 如果是 default，就从 CMakeLists.txt 中自动抓取作者设定的 SDK 版本
            SDK_VER=$(grep -i "set(sdkVersion" CMakeLists.txt | grep -o "[0-9]\+\.[0-9]\+\.[0-9]\+" | head -1)
            # 如果没抓到（作者删了这行），给个兜底版本
            if [ -z "$SDK_VER" ]; then SDK_VER="2.2.0"; fi 
            echo "SDK_TARGET=$SDK_VER" >> $GITHUB_ENV
            echo "Mode: DEFAULT. Using author's required SDK version: $SDK_VER"
          else
            # 如果写了具体数值，就用自定义的
            echo "SDK_TARGET=${{ env.CUSTOM_SDK }}" >> $GITHUB_ENV
            echo "Mode: CUSTOM. Forcing SDK version: ${{ env.CUSTOM_SDK }}"
          fi

      - name: Set up Pico SDK & Force Update TinyUSB
        run: |
          git clone --depth 1 --branch ${{ env.SDK_TARGET }} https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
          cd $HOME/pico-sdk
          git submodule update --init --recursive
          
          # 作者要求使用最新的 TinyUSB，这一步保持固定执行
          rm -rf lib/tinyusb
          git clone --depth 1 https://github.com/hathach/tinyusb.git lib/tinyusb
          
          echo "PICO_SDK_PATH=$HOME/pico-sdk" >> $GITHUB_ENV

      - name: Dynamically Extract Version
        id: get_version
        run: |
          VERSION=$(grep "pico_set_program_version" CMakeLists.txt | head -n 1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$VERSION" ]; then VERSION="unknown"; fi
          echo "VER=$VERSION" >> $GITHUB_ENV

      - name: Apply Individual Patches
        run: |
          # 每一个选项都独立判断：只有不等于 "default" 时，才执行 sed 替换
          
          # 1. 独立替换电压
          if [ "${{ env.CUSTOM_VOLT }}" != "default" ]; then
            sed -i "s/vreg_set_voltage(VREG_VOLTAGE_[0-9_]*)/vreg_set_voltage(VREG_VOLTAGE_${{ env.CUSTOM_VOLT }})/g" src/main.cpp
            echo "Patched Voltage -> VREG_VOLTAGE_${{ env.CUSTOM_VOLT }}"
          fi
          
          # 2. 独立替换延迟
          if [ "${{ env.CUSTOM_DELAY }}" != "default" ]; then
            sed -i "s/sleep_ms([0-9]*)/sleep_ms(${{ env.CUSTOM_DELAY }})/g" src/main.cpp
            echo "Patched Delay -> ${{ env.CUSTOM_DELAY }}ms"
          fi
          
          # 3. 独立替换频率
          if [ "${{ env.CUSTOM_FREQ }}" != "default" ]; then
            sed -i "s/set_sys_clock_khz([0-9]*, true)/set_sys_clock_khz(${{ env.CUSTOM_FREQ }}, true)/g" src/main.cpp
            echo "Patched Frequency -> ${{ env.CUSTOM_FREQ }} kHz"
          fi

      - name: Generate Smart Artifact Name
        run: |
          # 自动根据你的自定义情况生成文件后缀
          NAME="ds5-v${{ env.VER }}"
          
          if [ "${{ env.CUSTOM_FREQ }}" != "default" ]; then NAME="${NAME}-${{ env.CUSTOM_FREQ }}"; fi
          if [ "${{ env.CUSTOM_VOLT }}" != "default" ]; then NAME="${NAME}-${{ env.CUSTOM_VOLT }}V"; fi
          
          # 如果都没改，就加个 original 标签
          if [ "${{ env.CUSTOM_FREQ }}" == "default" ] && [ "${{ env.CUSTOM_VOLT }}" == "default" ]; then
            NAME="${NAME}-original"
          fi
          
          echo "FILE_NAME=$NAME" >> $GITHUB_ENV

      - name: Configure and Build
        run: |
          mkdir build && cd build
          cmake -DPICO_BOARD=pico2_w ..
          make -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILE_NAME }}
          path: build/*.uf2
