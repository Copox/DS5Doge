name: 构建 Pico2 W 普通版 DS5 固件

on:
  push:
    branches: [ build-firmware ]
  workflow_dispatch:

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 清理构建目录
        run: rm -rf build

      # 🔥 自动修复：注释无效的 Opus 配置（不修改你的源码）
      - name: 修复 CMake 依赖错误
        run: |
          sed -i 's/add_subdirectory(lib\/opus)/#add_subdirectory(lib\/opus)/g' CMakeLists.txt
          sed -i 's/opus$/#opus/g' CMakeLists.txt

      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential g++ cmake git python3 \
            gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      # 🔥 使用项目指定的 Pico SDK 2.2.0 + 强制更新 tinyusb
      - name: 初始化 Pico SDK
        run: |
          git clone --depth 1 --branch 2.2.0 https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
          cd ~/pico-sdk
          git submodule update --init --recursive
          cd lib/tinyusb
          git reset --hard origin/master

      # 🔥 智能提取版本号（自动适配 CMake）
      - name: 读取固件版本
        run: |
          VERSION=$(sed -n 's/pico_set_program_version(ds5-bridge "\(.*\)")/\1/p' CMakeLists.txt)
          echo "FIRMWARE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: 配置 CMake
        run: |
          mkdir build && cd build
          cmake .. -DPICO_SDK_PATH=~/pico-sdk

      - name: 编译固件
        run: |
          cd build
          make -j$(nproc)
          find . -name "*.uf2"

      # 🔥 修复废弃警告：使用 upload-artifact v4
      - name: 上传刷机固件
        uses: actions/upload-artifact@v4
        with:
          name: Pico2W-Normal-DS5-Firmware-v${{ env.FIRMWARE_VERSION }}
          path: build/**/*.uf2
          retention-days: 90
