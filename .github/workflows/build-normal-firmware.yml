name: 构建 Pico2 W 普通版 DS5 固件

on:
  push:
    branches: [ build-firmware ]
  workflow_dispatch:

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出项目代码
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 🔥 核心修复：自动克隆 Opus 官方源码（解决 opus.h 缺失）
      - name: 自动补齐 Opus 依赖库
        run: |
          git clone --depth 1 --branch v1.5.2 https://github.com/xiph/opus.git lib/opus
          echo "✅ Opus 库已自动添加到 lib/opus"

      - name: 清理构建目录
        run: rm -rf build

      - name: 安装交叉编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential g++ cmake git \
            gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      - name: 初始化 Pico SDK 2.2.0 + 强制更新 tinyusb 最新版
        run: |
          git clone --depth 1 --branch 2.2.0 https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
          cd ~/pico-sdk
          git submodule update --init --recursive
          cd lib/tinyusb
          git reset --hard origin/master

      # 🔥 智能提取版本号（自动适配 CMakeLists.txt）
      - name: 读取固件版本
        run: |
          VER=$(sed -n 's/pico_set_program_version(ds5-bridge "\(.*\)")/\1/p' CMakeLists.txt)
          echo "VERSION=$VER" >> $GITHUB_ENV
          echo "当前固件版本：v$VER"

      - name: CMake 配置
        run: |
          mkdir build && cd build
          cmake .. -DPICO_SDK_PATH=~/pico-sdk

      - name: 编译固件（全自动生成 UF2）
        run: |
          cd build
          make -j$(nproc)
          echo "=== 查找生成的固件 ==="
          find . -name "*.uf2"

      # 🔥 上传固件（v4 版本，无废弃警告）
      - name: 上传 Pico2 W 专用固件
        uses: actions/upload-artifact@v4
        with:
          name: Pico2W-Normal-Firmware-v${{ env.VERSION }}
          path: build/**/*.uf2
          retention-days: 90
