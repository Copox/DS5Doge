name: 构建 Pico2 W 普通版 DS5 固件

on:
  push:
    branches: [ build-firmware ]
  pull_request:
    branches: [ build-firmware ]
  workflow_dispatch:
    inputs:
      branch:
        description: 构建分支
        required: true
        default: build-firmware

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}
          submodules: recursive
          fetch-depth: 0

      # 重置缓存，保证tinyusb是最新版
      - name: 清理旧缓存
        run: rm -rf ~/pico-sdk

      # 安装编译依赖
      - name: 安装编译工具链
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            build-essential cmake git python3 \
            gcc-arm-none-eabi libnewlib-arm-none-eabi \
            libusb-1.0-0-dev

      # 拉取最新SDK + 【强制更新tinyusb到官方最新版】
      - name: 初始化 Pico SDK + 最新版 tinyusb
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
          cd ~/pico-sdk
          git submodule update --init --recursive
          
          # 🔥 核心：强制将 tinyusb 更新到官方最新 master 版（无残留、无冲突）
          cd ~/pico-sdk/lib/tinyusb
          git fetch origin
          git reset --hard origin/master
          git status

      # CMake配置：Pico2W + 禁用picotool + 普通版固件
      - name: 配置编译环境
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DPICO_SDK_PATH=~/pico-sdk \
            -DPICO_BOARD=pico2_w \
            -DPICO_NO_PICOTOOL=ON

      # 编译固件
      - name: 编译 Pico2 W 普通版固件
        run: |
          cd build
          make -j$(nproc)
          ls -lh *.uf2

      # 上传固件
      - name: 上传最终固件
        uses: actions/upload-artifact@v4
        with:
          name: Pico2W-Normal-Firmware
          path: build/*.uf2
          retention-days: 90
