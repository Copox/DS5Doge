name: 构建 Pico2 W 普通版 DS5 固件

on:
  push:
    branches: [ build-firmware ]
  pull_request:
    branches: [ build-firmware ]
  workflow_dispatch:
    inputs:
      branch:
        description: 构建分支
        required: true
        default: build-firmware

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}
          submodules: recursive
          fetch-depth: 0

      # 清理旧缓存，保证环境干净
      - name: 清理缓存
        run: rm -rf ~/pico-sdk

      # ✅ 核心修复：安装完整C/C++编译依赖（解决 <new> 报错）
      - name: 安装完整编译工具链
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            build-essential g++ cmake git python3 \
            gcc-arm-none-eabi libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib libusb-1.0-0-dev

      # 拉取最新SDK + 强制更新tinyusb到官方最新版
      - name: 初始化 Pico SDK + 最新 tinyusb
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
          cd ~/pico-sdk
          git submodule update --init --recursive
          
          # 强制更新 tinyusb 到最新主线版
          cd ~/pico-sdk/lib/tinyusb
          git fetch origin
          git reset --hard origin/master

      # CMake配置：Pico2W + 禁用picotool + 普通版固件
      - name: 配置编译环境
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DPICO_SDK_PATH=~/pico-sdk \
            -DPICO_BOARD=pico2_w \
            -DPICO_NO_PICOTOOL=ON

      # 编译固件（默认普通版，无DSE）
      - name: 编译 Pico2 W 固件
        run: |
          cd build
          make -j$(nproc)
          ls -lh *.uf2

      # 上传最终可刷机固件
      - name: 上传普通版固件
        uses: actions/upload-artifact@v4
        with:
          name: Pico2W-Normal-Firmware
          path: build/*.uf2
          retention-days: 90
