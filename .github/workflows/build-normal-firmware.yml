name: Build Custom Pico 2W Firmware (Full-Auto Alignment)

on:
  push:
    branches: [ "build-firmware" ]

env:
  # ================= 独立自定义配置区域 =================
  CUSTOM_FREQ: "default"              
  CUSTOM_VOLT: "default"                
  CUSTOM_DELAY: "default"               
  
  # 填写具体版本号 或 "default"(自动从 CMakeLists.txt 读取作者配置)
  CUSTOM_SDK: "default"              
  CUSTOM_TOOLCHAIN: "default"        
  CUSTOM_PICOTOOL: "default"         
  # =================================================

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Base Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake python3 libusb-1.0-0-dev libstdc++-arm-none-eabi-newlib libnewlib-arm-none-eabi

      - name: Auto-Detect and Install Toolchain
        run: |
          # 1. 确定版本号
          if [ "${{ env.CUSTOM_TOOLCHAIN }}" = "default" ]; then
            RAW_TC_VER=$(grep "set(toolchainVersion" CMakeLists.txt | sed 's/.*toolchainVersion \(.*\)).*/\1/' | xargs)
            if [ -z "$RAW_TC_VER" ]; then RAW_TC_VER="14_2_Rel1"; fi
          else
            RAW_TC_VER="${{ env.CUSTOM_TOOLCHAIN }}"
          fi
          
          # 2. 格式转换: 14_2_Rel1 -> 14.2.rel1 (用于构建下载链接)
          URL_VER=$(echo $RAW_TC_VER | sed 's/_/./g' | tr '[:upper:]' '[:lower:]')
          echo "Target Toolchain Version: $URL_VER"
          
          # 3. 下载并解压
          curl -Lo gcc-arm.tar.xz "https://developer.arm.com/-/media/Files/downloads/gnu/$URL_VER/binrel/arm-gnu-toolchain-$URL_VER-x86_64-arm-none-eabi.tar.xz"
          mkdir -p $HOME/toolchain
          tar -xf gcc-arm.tar.xz -C $HOME/toolchain --strip-components=1
          echo "$HOME/toolchain/bin" >> $GITHUB_PATH
          echo "COMPILER_PATH=$HOME/toolchain/bin" >> $GITHUB_ENV

      - name: Auto-Detect and Build Picotool
        run: |
          if [ "${{ env.CUSTOM_PICOTOOL }}" = "default" ]; then
            PT_VER=$(grep "set(picotoolVersion" CMakeLists.txt | sed 's/.*picotoolVersion \(.*\)).*/\1/' | xargs)
            if [ -z "$PT_VER" ]; then PT_VER="2.2.0-a4"; fi
          else
            PT_VER="${{ env.CUSTOM_PICOTOOL }}"
          fi
          echo "Target Picotool Version: $PT_VER"
          
          git clone --branch $PT_VER https://github.com/raspberrypi/picotool.git $HOME/picotool
          cd $HOME/picotool
          mkdir build && cd build
          cmake ..
          make -j$(nproc)
          sudo make install

      - name: Auto-Detect and Set up Pico SDK
        run: |
          if [ "${{ env.CUSTOM_SDK }}" = "default" ]; then
            SDK_VER=$(grep "set(sdkVersion" CMakeLists.txt | sed 's/.*sdkVersion \(.*\)).*/\1/' | xargs)
            if [ -z "$SDK_VER" ]; then SDK_VER="2.2.0"; fi
          else
            SDK_VER="${{ env.CUSTOM_SDK }}"
          fi
          echo "Target SDK Version: $SDK_VER"
          
          git clone --depth 1 --branch $SDK_VER https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
          cd $HOME/pico-sdk
          git submodule update --init --recursive
          
          # 始终同步最新的 TinyUSB (这是目前 DS5 项目稳定性的关键)
          rm -rf lib/tinyusb
          git clone --depth 1 https://github.com/hathach/tinyusb.git lib/tinyusb
          
          echo "PICO_SDK_PATH=$HOME/pico-sdk" >> $GITHUB_ENV

      - name: Dynamically Extract Program Version
        id: get_version
        run: |
          VERSION=$(grep "pico_set_program_version" CMakeLists.txt | head -n 1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VER=$VERSION" >> $GITHUB_ENV

      - name: Apply Frequency/Voltage/Delay Patches
        run: |
          if [ "${{ env.CUSTOM_VOLT }}" != "default" ]; then
            sed -i "s/vreg_set_voltage(VREG_VOLTAGE_[0-9_]*)/vreg_set_voltage(VREG_VOLTAGE_${{ env.CUSTOM_VOLT }})/g" src/main.cpp
          fi
          if [ "${{ env.CUSTOM_DELAY }}" != "default" ]; then
            sed -i "s/sleep_ms([0-9]*)/sleep_ms(${{ env.CUSTOM_DELAY }})/g" src/main.cpp
          fi
          if [ "${{ env.CUSTOM_FREQ }}" != "default" ]; then
            sed -i "s/set_sys_clock_khz([0-9]*, true)/set_sys_clock_khz(${{ env.CUSTOM_FREQ }}, true)/g" src/main.cpp
          fi

      - name: Configure and Build
        run: |
          mkdir build && cd build
          cmake -DPICO_BOARD=pico2_w \
                -DCMAKE_C_COMPILER=${{ env.COMPILER_PATH }}/arm-none-eabi-gcc \
                -DCMAKE_CXX_COMPILER=${{ env.COMPILER_PATH }}/arm-none-eabi-g++ \
                ..
          make -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ds5-v${{ env.VER }}-${{ env.CUSTOM_FREQ }}-${{ env.CUSTOM_VOLT }}V
          path: build/*.uf2
