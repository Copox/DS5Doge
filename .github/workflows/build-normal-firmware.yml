name: 构建 Pico2 W 普通版 DS5 固件

on:
  push:
    branches: [ build-firmware ]
  workflow_dispatch:

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 清理环境
        run: rm -rf build

      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential g++ cmake git python3 \
            gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      - name: 初始化 Pico SDK + 最新 tinyusb
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
          cd ~/pico-sdk
          git submodule update --init --recursive
          cd lib/tinyusb
          git reset --hard origin/master

      # 🔥 核心：开启SDK原生自动生成UF2，无需任何手动转换
      - name: 配置 CMake
        run: |
          mkdir build && cd build
          cmake .. \
            -DPICO_SDK_PATH=~/pico-sdk \
            -DPICO_BOARD=pico2_w \
            -DPICO_NO_PICOTOOL=ON \
            -DPICO_DEFAULT_UF2=ON

      - name: 编译固件
        run: |
          cd build
          make -j$(nproc)
          # 查看自动生成的UF2（SDK直接输出，100%存在）
          ls -lh *.uf2

      # 上传固件（SDK自动生成，路径固定）
      - name: 上传刷机固件
        uses: actions/upload-artifact@v4
        with:
          name: Pico2W-Normal-Firmware
          path: build/*.uf2
          retention-days: 90
