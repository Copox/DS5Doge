name: 构建 Pico2 W 普通版 DS5 固件

on:
  push:
    branches: [ build-firmware ]
  workflow_dispatch:

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔥 核心：强制手动初始化并更新所有子模块（确保 Opus 被拉取）
      - name: 强制初始化子模块
        run: |
          git submodule sync
          git submodule update --init --recursive --force
          
          # 验证 Opus 是否存在
          echo "=== 检查 lib/opus 目录 ==="
          ls -la lib/
          if [ -d "lib/opus" ]; then
            echo "✅ Opus 子模块拉取成功"
            ls -la lib/opus/
          else
            echo "❌ Opus 子模块不存在，尝试手动克隆"
            git clone https://github.com/xiph/opus.git lib/opus
            cd lib/opus
            git checkout v1.5.2  # 使用稳定版
          fi

      - name: 清理环境
        run: rm -rf build

      - name: 安装完整编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential g++ cmake git python3 \
            gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      - name: 初始化 Pico SDK 2.2.0 + 最新 tinyusb
        run: |
          git clone --depth 1 --branch 2.2.0 https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
          cd ~/pico-sdk
          git submodule update --init --recursive
          cd lib/tinyusb
          git fetch origin && git reset --hard origin/master

      - name: 提取固件版本号
        id: get_version
        run: |
          VERSION=$(grep -E 'pico_set_program_version\(ds5-bridge "[0-9]+\.[0-9]+\.[0-9]+"\)' CMakeLists.txt | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')
          echo "提取到的版本号: $VERSION"
          echo "FIRMWARE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: 配置 CMake
        run: |
          mkdir build && cd build
          cmake .. -DPICO_SDK_PATH=~/pico-sdk

      - name: 编译固件
        run: |
          cd build
          make -j$(nproc)
          
          echo "=== 构建产物 ==="
          ls -lh
          echo "=== 查找 UF2 固件 ==="
          find . -name "*.uf2"

      - name: 上传刷机固件
        uses: actions/upload-artifact@v4
        with:
          name: Pico2W-Normal-DS5-Firmware-v${{ env.FIRMWARE_VERSION }}
          path: build/**/*.uf2
          retention-days: 90
