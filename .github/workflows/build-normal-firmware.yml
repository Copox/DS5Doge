name: 构建 Pico2 W 普通版 DS5 固件

on:
  push:
    branches: [ build-firmware ]
  workflow_dispatch:

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 🔥 确保拉取所有子模块（包括新增的 Opus）
          fetch-depth: 0

      - name: 清理环境
        run: rm -rf build

      - name: 安装完整编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential g++ cmake git python3 \
            gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      - name: 初始化 Pico SDK 2.2.0 + 最新 tinyusb
        run: |
          git clone --depth 1 --branch 2.2.0 https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
          cd ~/pico-sdk
          git submodule update --init --recursive
          cd lib/tinyusb
          git fetch origin && git reset --hard origin/master

      - name: 配置 CMake
        run: |
          mkdir build && cd build
          cmake .. -DPICO_SDK_PATH=~/pico-sdk

      - name: 编译固件
        run: |
          cd build
          make -j$(nproc)
          
          # 查看构建产物
          echo "=== 构建产物 ==="
          ls -lh
          echo "=== 查找 UF2 固件 ==="
          find . -name "*.uf2"

      - name: 上传刷机固件
        uses: actions/upload-artifact@v4
        with:
          name: Pico2W-Normal-DS5-Firmware-v0.5.0
          path: build/**/*.uf2
          retention-days: 90
