name: 构建 Pico2 W 普通版 DS5 固件

# 仅 build-firmware 分支触发
on:
  push:
    branches: [ build-firmware ]
  pull_request:
    branches: [ build-firmware ]
  workflow_dispatch:
    inputs:
      branch:
        description: 构建分支
        required: true
        default: build-firmware

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}
          submodules: recursive
          fetch-depth: 0

      # 缓存SDK，加速构建
      - name: 缓存 Pico SDK
        uses: actions/cache@v4
        with:
          path: ~/pico-sdk
          key: ${{ runner.os }}-pico-sdk-fixed-${{ github.ref_name }}

      # 安装完整依赖（修复USB依赖 + 编译工具链）
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            build-essential cmake git python3 \
            gcc-arm-none-eabi libnewlib-arm-none-eabi \
            libusb-1.0-0-dev  # 修复picotool USB依赖报错

      # 拉取最新SDK（支持Pico2 W）
      - name: 初始化 Pico SDK
        run: |
          if [ ! -d ~/pico-sdk ]; then
            git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
            cd ~/pico-sdk && git submodule update --init --recursive
          fi
          cd ~/pico-sdk/lib/tinyusb && git pull origin master

      # ✅ 核心修复：禁用picotool编译 + 指定Pico2 W + 普通版固件
      - name: CMake 配置
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DPICO_SDK_PATH=~/pico-sdk \
            -DPICO_BOARD=pico2_w \
            -DPICO_NO_PICOTOOL=ON  # 强制禁用picotool，根治报错

      # 编译固件（默认普通版，DSE已注释）
      - name: 编译 Pico2 W 固件
        run: |
          cd build
          make -j$(nproc)
          ls -lh *.uf2

      # 上传最终固件
      - name: 上传普通版固件
        uses: actions/upload-artifact@v4
        with:
          name: Pico2W-Normal-Firmware
          path: build/*.uf2
          retention-days: 90
