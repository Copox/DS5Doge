name: Build Custom Pico 2W Firmware (Clean Naming)

on:
  push:
    branches: [ "build-firmware" ]

env:
  # ================= 独立自定义配置区域 =================
  CUSTOM_FREQ: "default"              
  CUSTOM_VOLT: "default"                
  CUSTOM_DELAY: "default"               
  CUSTOM_SDK: "default"              
  CUSTOM_TOOLCHAIN: "default"        
  # =================================================

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Base Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake python3 libusb-1.0-0-dev libstdc++-arm-none-eabi-newlib libnewlib-arm-none-eabi

      - name: Auto-Detect and Install Toolchain
        run: |
          TC_VER=$(grep "set(toolchainVersion" CMakeLists.txt | sed 's/.*toolchainVersion \(.*\)).*/\1/' | xargs)
          if [ "${{ env.CUSTOM_TOOLCHAIN }}" != "default" ]; then TC_VER="${{ env.CUSTOM_TOOLCHAIN }}"; fi
          
          URL_VER=$(echo $TC_VER | sed 's/_/./g' | tr '[:upper:]' '[:lower:]')
          curl -Lo gcc-arm.tar.xz "https://developer.arm.com/-/media/Files/downloads/gnu/$URL_VER/binrel/arm-gnu-toolchain-$URL_VER-x86_64-arm-none-eabi.tar.xz"
          mkdir -p $HOME/toolchain
          tar -xf gcc-arm.tar.xz -C $HOME/toolchain --strip-components=1
          
          echo "$HOME/toolchain/bin" >> $GITHUB_PATH
          echo "FINAL_CC=$HOME/toolchain/bin/arm-none-eabi-gcc" >> $GITHUB_ENV
          echo "FINAL_CXX=$HOME/toolchain/bin/arm-none-eabi-g++" >> $GITHUB_ENV

      - name: Set up SDK & Smart Naming
        run: |
          # 1. SDK 设置
          SDK_VER=$(grep "set(sdkVersion" CMakeLists.txt | sed 's/.*sdkVersion \(.*\)).*/\1/' | xargs)
          if [ "${{ env.CUSTOM_SDK }}" != "default" ]; then SDK_VER="${{ env.CUSTOM_SDK }}"; fi
          
          git clone --depth 1 --branch $SDK_VER https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
          cd $HOME/pico-sdk && git submodule update --init --recursive
          rm -rf lib/tinyusb && git clone --depth 1 https://github.com/hathach/tinyusb.git lib/tinyusb
          
          # 2. 路径修复
          if [ -f "$GITHUB_WORKSPACE/pico_sdk_import.cmake" ]; then
            sed -i "1i set(PICO_SDK_PATH \"$HOME/pico-sdk\")" $GITHUB_WORKSPACE/pico_sdk_import.cmake
          fi
          
          # 3. 智能生成精简版文件名
          PROJ_VER=$(grep "pico_set_program_version" $GITHUB_WORKSPACE/CMakeLists.txt | head -n 1 | sed 's/.*"\(.*\)".*/\1/')
          FNAME="ds5-v${PROJ_VER}"
          if [ "${{ env.CUSTOM_FREQ }}" != "default" ]; then FNAME="${FNAME}-F${{ env.CUSTOM_FREQ }}"; fi
          if [ "${{ env.CUSTOM_VOLT }}" != "default" ]; then FNAME="${FNAME}-V${{ env.CUSTOM_VOLT }}"; fi
          
          echo "FINAL_FILENAME=$FNAME" >> $GITHUB_ENV
          echo "PICO_SDK_PATH=$HOME/pico-sdk" >> $GITHUB_ENV

      - name: Apply Patches
        run: |
          [ "${{ env.CUSTOM_VOLT }}" != "default" ] && sed -i "s/vreg_set_voltage(VREG_VOLTAGE_[0-9_]*)/vreg_set_voltage(VREG_VOLTAGE_${{ env.CUSTOM_VOLT }})/g" src/main.cpp
          [ "${{ env.CUSTOM_DELAY }}" != "default" ] && sed -i "s/sleep_ms([0-9]*)/sleep_ms(${{ env.CUSTOM_DELAY }})/g" src/main.cpp
          [ "${{ env.CUSTOM_FREQ }}" != "default" ] && sed -i "s/set_sys_clock_khz([0-9]*, true)/set_sys_clock_khz(${{ env.CUSTOM_FREQ }}, true)/g" src/main.cpp

      - name: Configure and Build
        run: |
          mkdir build && cd build
          cmake -DPICO_BOARD=pico2_w \
                -DPICO_SDK_PATH=$HOME/pico-sdk \
                -DCMAKE_C_COMPILER=${{ env.FINAL_CC }} \
                -DCMAKE_CXX_COMPILER=${{ env.FINAL_CXX }} \
                ..
          make -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FINAL_FILENAME }}
          path: build/*.uf2
