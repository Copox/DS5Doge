name: Build DS5Dongle (Official Submodule Version)

on:
  push:
    branches: [ build-firmware ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 关键优化：现在包含 Opus 了，递归拉取所有已定义的子模块
          submodules: recursive

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential libstdc++-arm-none-eabi-newlib python3

      
      - name: Patch Overclocking for Stability
        run: |
          # 1. 调教默认电压
          # sed -i 's/VREG_VOLTAGE_1_20/VREG_VOLTAGE_1_30/g' src/main.cpp
          
          # 2. 调教默认频率
          sed -i 's/set_sys_clock_khz(270000, true)/set_sys_clock_khz(260000, true)/g' src/main.cpp
          
          # 3. 建议稍微增加启动自检延迟，确保 PLL 锁定
          # sed -i 's/sleep_ms(1000)/sleep_ms(1500)/g' src/main.cpp

      - name: Setup Pico SDK 2.2.0 & Latest TinyUSB
        run: |
          git clone --depth 1 --branch 2.2.0 https://github.com/raspberrypi/pico-sdk.git
          cd pico-sdk
          git submodule update --init
          
          # 遵照作者建议：升级 SDK 内部的 TinyUSB 到最新 master
          cd lib/tinyusb
          git fetch origin master
          git checkout origin/master
          
          cd ../..
          echo "PICO_SDK_PATH=$PWD" >> $GITHUB_ENV

      - name: Configure and Build
        run: |
          mkdir build
          cd build
          cmake .. -DPICO_BOARD=pico2_w -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ds5-dongle-firmware
          path: |
            build/*.uf2
            build/*.elf
