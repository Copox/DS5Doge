name: Build Custom Pico 2W Firmware (Auto Trigger)

on:
  push:
    branches: [ "build-firmware" ]

env:
  # ================= 自定义配置区域 =================
  APPLY_PATCH: "false"                
  TARGET_FREQ: "260000"              
  TARGET_VOLT: "1_20"                
  BOOT_DELAY: "1000"                 
  PICO_SDK_VERSION: "2.2.0"          
  # =================================================

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update Submodules
        run: git submodule update --init --recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib python3

      - name: Set up Pico SDK
        run: |
          git clone --depth 1 --branch ${{ env.PICO_SDK_VERSION }} https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
          echo "PICO_SDK_PATH=$HOME/pico-sdk" >> $GITHUB_ENV

      - name: Set up Latest TinyUSB
        run: |
          git clone --depth 1 https://github.com/hathach/tinyusb.git $HOME/tinyusb
          echo "PICO_TINYUSB_PATH=$HOME/tinyusb" >> $GITHUB_ENV

      - name: Dynamically Extract Version
        id: get_version
        run: |
          # 核心改进：无论括号里是什么数字，只抓取引号内的内容
          # 匹配模式：寻找包含 pico_set_program_version 的行，提取第二个引号对中的内容
          RAW_VER=$(grep "pico_set_program_version" CMakeLists.txt | head -n 1 | sed 's/.*"\(.*\)".*/\1/')
          
          # 如果提取失败（例如作者改了格式），则给个默认值防止脚本崩溃
          if [ -z "$RAW_VER" ]; then RAW_VER="unknown"; fi
          
          echo "VER=$RAW_VER" >> $GITHUB_ENV
          echo "Successfully detected version from CMakeLists: $RAW_VER"

      - name: Regex Patch Source Code
        if: env.APPLY_PATCH == 'true'
        run: |
          sed -i "s/set_sys_clock_khz([0-9]*, true)/set_sys_clock_khz(${{ env.TARGET_FREQ }}, true)/g" src/main.cpp
          sed -i "s/vreg_set_voltage(VREG_VOLTAGE_[0-9_]*)/vreg_set_voltage(VREG_VOLTAGE_${{ env.TARGET_VOLT }})/g" src/main.cpp
          sed -i "s/sleep_ms([0-9]*)/sleep_ms(${{ env.BOOT_DELAY }})/g" src/main.cpp

      - name: Configure and Build
        run: |
          mkdir build && cd build
          cmake -DPICO_BOARD=pico2_w ..
          make -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          # 文件名会根据动态抓取的 VER 变量自动重命名
          name: >-
            ${{ env.APPLY_PATCH == 'true' 
                && format('ds5-v{0}-{1}-{2}', env.VER, env.TARGET_FREQ, env.TARGET_VOLT) 
                || format('ds5-v{0}-original', env.VER) }}
          path: |
            build/*.uf2
